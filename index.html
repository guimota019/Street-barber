<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Street barber</title>

<style>

*{
box-sizing:border-box;
}

body{
font-family: 'Segoe UI', Arial, sans-serif;
background: linear-gradient(135deg,#0f0f0f,#1a1a1a,#000);
color:white;
margin:0;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.container{
background: rgba(20,20,20,0.95);
padding:35px;
border-radius:18px;
width:400px;
box-shadow:0 0 40px rgba(255,0,0,0.35);
backdrop-filter: blur(10px);
border:1px solid rgba(255,255,255,0.05);
}

h1{
text-align:center;
color:#ff2b2b;
margin-bottom:4px;
letter-spacing:2px;
text-shadow:
0 0 5px #ff0000,
0 0 10px #ff0000,
0 0 20px #ff0000;
}

label{
font-size:13px;
color:#ccc;
}

input, select{
width:100%;
padding:12px;
margin-top:6px;
margin-bottom:16px;
border-radius:8px;
border:none;
background:#111;
color:white;
font-size:14px;
transition:0.2s;
}

input:focus, select:focus{
outline:none;
box-shadow:0 0 10px rgba(255,0,0,0.7);
background:#151515;
}

button{
width:100%;
padding:13px;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
margin-top:6px;
color:white;
font-size:14px;
background:linear-gradient(45deg,#ff0000,#b30000);
transition:0.2s;
}

button:hover{
transform:scale(1.03);
box-shadow:0 0 15px rgba(255,0,0,0.6);
}

.whatsapp{
background:linear-gradient(45deg,#25d366,#128c7e);
}

.agendamentos{
margin-top:25px;
}

.item{
background:#111;
padding:15px;
border-radius:10px;
margin-top:12px;
border-left:4px solid #ff2b2b;
font-size:14px;
line-height:1.5;
box-shadow:0 0 10px rgba(0,0,0,0.6);
}

.cancelar{
background:#ff3b3b;
margin-top:10px;
}

.cancelar:hover{
background:#d40000;
}

.horarios{
margin-top:25px;
font-size:13px;
color:#bbb;
text-align:center;
line-height:1.6;
}

    .topo{
text-align:center;
margin-bottom:20px;
}

.sub{
font-size:13px;
color:#aaa;
margin-top:12px;
margin-bottom:15px;
}

.linha{
width:80px;
height:3px;
margin:2px auto 6px auto;
border-radius:10px;
background:linear-gradient(90deg, transparent, #ff2b2b, transparent);
animation:brilho 2s linear infinite;
}

@keyframes brilho{

0%{
transform:scaleX(0.6);
opacity:0.6;
}

50%{
transform:scaleX(1);
opacity:1;
}

100%{
transform:scaleX(0.6);
opacity:0.6;
}

} 

.icone{
font-size:20px;
text-align:center;
margin:2px 0;
filter: drop-shadow(0 0 6px red);
}

.credito{
position:fixed;
bottom:10px;
right:15px;
font-size:12px;
color:#888;
opacity:0.7;
font-family:Arial;
}

.credito:hover{
opacity:1;
color:#ff2b2b;
}
</style>
</head>
    
<body>

<div class="credito">© 2026 • Feito por Mota</div>    

<div class="container">

<div class="topo">

<h1 onclick="segredoBarbeiro()">STREET BARBER</h1>

<div class="icone">💈</div>

<div class="linha"></div>

<p class="sub">Agende seu horário</p>

</div>

<label>Nome</label>
<input type="text" id="nome">

<label>Telefone</label>
<input type="tel" id="telefone" placeholder="Ex: 19999999999">

<label>Serviço</label>
<select id="servico">
<option>Corte - R$35</option>
<option>Corte + Sobrancelha - R$40</option>
<option>Corte + Barba - R$55</option>
<option>Barba - R$30</option>
<option>Corte + Pigmentação - R$50</option>
<option>Corte + Luzes - R$75</option>
<option>Corte + Relaxamento - R$65</option>
</select>

<label>Barbeiro</label>
<select id="barbeiro">
<option>Pastor</option>
</select>

<label>Data</label>
<input type="date" id="data">

<label>Horário</label>
<select id="hora"></select>

<button onclick="agendar()">Agendar horário</button>
<button class="whatsapp" onclick="enviarWhats()">Confirmar no Whatsapp</button>

<div class="agendamentos" id="lista"></div>

<div class="horarios">
<b>Horários de funcionamento:</b><br>
Terça a sexta: 9h às 19h<br>
Sábado: 9h às 16h
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDGitiusddB0lTMbF05pLWeGtqvYkmwAbk",
  authDomain: "street-barber-34a37.firebaseapp.com",
  projectId: "street-barber-34a37",
  storageBucket: "street-barber-34a37.firebasestorage.app",
  messagingSenderId: "785996344727",
  appId: "1:785996344727:web:9fc92c13c00d78964868d2",
  measurementId: "G-2M2BM2Q353"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let cliquesTitulo = 0;
let numeroWhatsapp = "5519991365137";
let modoBarbeiro = false;
let ultimoAgendamento = "";

async function mostrarAgendamentos(){

let lista = document.getElementById("lista");
lista.innerHTML="";

const querySnapshot = await getDocs(collection(db,"agendamentos"));

querySnapshot.forEach((docSnap)=>{

let a = docSnap.data();
let id = docSnap.id;

let item = document.createElement("div");

item.className="item";

item.innerHTML=`
<b>${a.nome}</b><br>
Serviço: ${a.servico}<br>
Barbeiro: ${a.barbeiro}<br>
📅 ${a.data} às ${a.hora}
<br>
${modoBarbeiro ? `<button class="cancelar" onclick="remover('${id}')">Cancelar</button>` : ""}
`;

lista.appendChild(item);

});

}

mostrarAgendamentos();

document.getElementById("data").addEventListener("change", function(){

let dataSelecionada = new Date(this.value);
let diaSemana = dataSelecionada.getDay();
let horaSelect = document.getElementById("hora");

horaSelect.innerHTML="";

if(diaSemana === 6){
alert("Não atendemos aos domingos.");
this.value="";
return;
}

if(diaSemana === 0){
alert("Não atendemos às segundas.");
this.value="";
return;
}

let horarios=[];

if(diaSemana>=1 && diaSemana<=4){
horarios=["09:00","10:00","11:00","12:00","13:00","14:00","15:00","16:00","17:00","18:00","19:00"];
}
else if(diaSemana==5){
horarios=["09:00","10:00","11:00","12:00","13:00","14:00","15:00","16:00"];
}

horarios.forEach(h=>{

let option=document.createElement("option");
option.value=h;
option.textContent=h;

horaSelect.appendChild(option);

});

});
    
window.agendar = async function(){

let nome=document.getElementById("nome").value;
let servico=document.getElementById("servico").value;
let barbeiro=document.getElementById("barbeiro").value;
let data=document.getElementById("data").value;
let hora=document.getElementById("hora").value;

if(nome=="" || data==""){
alert("Preencha todos os campos");
return;
}

await addDoc(collection(db,"agendamentos"),{
nome:nome,
servico:servico,
barbeiro:barbeiro,
data:data,
hora:hora
});

ultimoAgendamento=`
Cliente: ${nome}
Serviço: ${servico}
Barbeiro: ${barbeiro}
Data: ${data}
Horário: ${hora}
`;

limparCampos();
mostrarAgendamentos();

alert("Agendamento realizado!");

}

window.remover = async function(id){

if(confirm("Cancelar agendamento?")){

await deleteDoc(doc(db,"agendamentos",id));

mostrarAgendamentos();

}

}

function limparCampos(){

document.getElementById("nome").value="";
document.getElementById("data").value="";
document.getElementById("hora").innerHTML="";

}

window.enviarWhats = function(){

let telefoneCliente = document.getElementById("telefone").value;

if(telefoneCliente == ""){
alert("Digite seu telefone");
return;
}

let mensagemBarbeiro = `
💈 Novo agendamento

${ultimoAgendamento}
`;

let mensagemCliente = `
💈 Street Barber

Seu horário foi confirmado!

${ultimoAgendamento}

Se precisar cancelar, avise no WhatsApp.
`;

let urlBarbeiro = "https://wa.me/"+numeroBarbeiro+"?text="+encodeURIComponent(mensagemBarbeiro);
let urlCliente = "https://wa.me/55"+telefoneCliente+"?text="+encodeURIComponent(mensagemCliente);

window.open(urlBarbeiro);
setTimeout(()=>{ window.open(urlCliente); },800);

}

window.loginBarbeiro = function(){

let senha = prompt("Digite a senha do barbeiro");

if(senha === "barber123"){

modoBarbeiro = true;

alert("Modo barbeiro ativado");

mostrarAgendamentos();

} else {

alert("Senha incorreta");

}

}

window.segredoBarbeiro = function(){

cliquesTitulo++;

if(cliquesTitulo >= 5){

loginBarbeiro();

cliquesTitulo = 0;

}

}
</script>

</body>
</html>
