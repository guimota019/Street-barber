<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Street Barber</title>

<style>

body{
    font-family: Arial;
    background: linear-gradient(135deg, #000, #333);
    color: white;
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

.container{
    background: #000;
    padding: 30px;
    border-radius: 15px;
    width: 380px;
    box-shadow: 0 0 25px rgba(255, 0, 0, 0.5);
}

.logo{
    width: 200px;
    display: block;
    margin: auto;
    margin-bottom: 10px;
}

h1{
    text-align: center;
    color: #ff0000;
}

label{
    font-size: 14px;
    color: #fff;
}

input, select{
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    margin-bottom: 15px;
    border-radius: 6px;
    border: none;
    background: #111;
    color: white; 
}

input:focus, select:focus{
    outline: none;
    box-shadow: 0 0 8px #ff0000;
}

button{
    width: 100%;
    padding: 12px;
    background: #ff0000;
    border: none;
    border-radius: 8px;
    font-weight: bold;
    cursor: pointer;
    margin-top: 5px;
    color: white;
}

button:hover{
    background: #cc0000;
}

.whatsapp{
    background: #ff0000;
}

.agendamentos{
    margin-top: 25px;
}

.item{
    background: #111;
    padding: 12px;
    border-radius: 8px;
    margin-top: 10px;
    border-left: 4px solid #ff0000;
    font-size: 14px;
}

.cancelar{
    background: #ff4d4d;
    margin-top: 8px;
    color: white;
}

.horarios{
    margin-top: 20px;
    font-size: 14px;
    color: #fff;
    text-align: center;
}

</style>
</head>

<body>

<div class="container">

<img src="logo.png" class="logo">

<h1>💈 Street Barber</h1>

<label>Nome</label>
<input type="text" id="nome">

<label>Serviço</label>
<select id="servico">
<option>Corte 35</option>
<option>Corte + Sobrancelha 40</option>
<option>Corte + Barba 55</option>
<option>Barba 30</option>
<option>Corte + Pigmentação 50</option>
<option>Corte + Luzes 75</option>
<option>Corte + Relaxamento 65</option>
</select>

<label>Barbeiro</label>
<select id="barbeiro">
<option>Pastor</option>
</select>

<label>Data</label>
<input type="date" id="data">

<label>Horário</label>
<select id="hora"></select>

<button onclick="agendar()">Agendar Horário</button>
<button class="whatsapp" onclick="enviarWhats()">Enviar para WhatsApp</button>

<div class="agendamentos" id="lista"></div>

<div class="horarios">
<b>Horários de funcionamento:</b><br>
Terça a sexta: 9h às 19h<br>
Sábado: 9h às 16h
</div>

</div>

<script>

let numeroWhatsapp = "5519991365137";
let agendamentos = JSON.parse(localStorage.getItem("agenda")) || [];
let ultimoAgendamento = "";
mostrarAgendamentos();

document.getElementById("data").addEventListener("change", function(){

let dataSelecionada = new Date(this.value);
let diaSemana = dataSelecionada.getDay();
let horaSelect = document.getElementById("hora");

horaSelect.innerHTML = "";

if(diaSemana == 0 || diaSemana == 1){
alert("Não atendemos nesse dia.");
this.value = "";
return;
}

let horarios = [];

if(diaSemana >= 2 && diaSemana <= 5){
horarios = ["09:00","10:00","11:00","12:00","13:00","14:00","15:00","16:00","17:00","18:00","19:00"];
}

else if(diaSemana == 6){
horarios = ["09:00","10:00","11:00","12:00","13:00","14:00","15:00","16:00"];
}

horarios.forEach(h => {

let option = document.createElement("option");
option.value = h;
option.textContent = h;

horaSelect.appendChild(option);

});

});

function agendar(){

let nome = document.getElementById("nome").value;
let servico = document.getElementById("servico").value;
let barbeiro = document.getElementById("barbeiro").value;
let data = document.getElementById("data").value;
let hora = document.getElementById("hora").value;

if(nome == "" || data == ""){
alert("Preencha todos os campos");
return;
}

let horarioExiste = agendamentos.find(a => a.data == data && a.hora == hora && a.barbeiro == barbeiro);

if(horarioExiste){
alert("Esse horário já foi reservado!");
return;
}

let agendamento = { nome, servico, barbeiro, data, hora };

agendamentos.push(agendamento);

localStorage.setItem("agenda", JSON.stringify(agendamentos));

ultimoAgendamento = `
Cliente: ${nome}
Serviço: ${servico}
Barbeiro: ${barbeiro}
Data: ${data}
Horário: ${hora}
`;

limparCampos();
mostrarAgendamentos();

alert("Agendamento realizado!");

}

function mostrarAgendamentos(){

let lista = document.getElementById("lista");

lista.innerHTML = "";

agendamentos.forEach((a,i)=>{

let item = document.createElement("div");

item.className="item";

item.innerHTML=`
<b>${a.nome}</b><br>
Serviço: ${a.servico}<br>
Barbeiro: ${a.barbeiro}<br>
📅 ${a.data} às ${a.hora}
<br>
<button class="cancelar" onclick="remover(${i})">Cancelar</button>
`;

lista.appendChild(item);

});

}

function remover(i){

if(confirm("Cancelar agendamento?")){

agendamentos.splice(i,1);

localStorage.setItem("agenda", JSON.stringify(agendamentos));

mostrarAgendamentos();

}

}

function limparCampos(){

document.getElementById("nome").value="";
document.getElementById("data").value="";
document.getElementById("hora").innerHTML="";

}

function enviarWhats(){

if(ultimoAgendamento==""){
alert("Faça um agendamento primeiro");
return;
}

let url="https://wa.me/"+numeroWhatsapp+"?text="+encodeURIComponent(ultimoAgendamento);

window.open(url);

}

</script>

</body>
</html>
