<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Street barber</title>

<style>

*{
box-sizing:border-box;
}

body{
font-family: 'Segoe UI', Arial, sans-serif;
background: linear-gradient(135deg,#0f0f0f,#1a1a1a,#000);
color:white;
margin:0;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.container{
background: rgba(20,20,20,0.95);
padding:35px;
border-radius:18px;
width:400px;
box-shadow:0 0 40px rgba(255,0,0,0.35);
backdrop-filter: blur(10px);
border:1px solid rgba(255,255,255,0.05);
}

h1{
text-align:center;
color:#ff2b2b;
margin-bottom:25px;
letter-spacing:1px;
}

label{
font-size:13px;
color:#ccc;
}

input, select{
width:100%;
padding:12px;
margin-top:6px;
margin-bottom:16px;
border-radius:8px;
border:none;
background:#111;
color:white;
font-size:14px;
transition:0.2s;
}

input:focus, select:focus{
outline:none;
box-shadow:0 0 10px rgba(255,0,0,0.7);
background:#151515;
}

button{
width:100%;
padding:13px;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
margin-top:6px;
color:white;
font-size:14px;
background:linear-gradient(45deg,#ff0000,#b30000);
transition:0.2s;
}

button:hover{
transform:scale(1.03);
box-shadow:0 0 15px rgba(255,0,0,0.6);
}

.whatsapp{
background:linear-gradient(45deg,#25d366,#128c7e);
}

.agendamentos{
margin-top:25px;
}

.item{
background:#111;
padding:15px;
border-radius:10px;
margin-top:12px;
border-left:4px solid #ff2b2b;
font-size:14px;
line-height:1.5;
box-shadow:0 0 10px rgba(0,0,0,0.6);
}

.cancelar{
background:#ff3b3b;
margin-top:10px;
}

.cancelar:hover{
background:#d40000;
}

.horarios{
margin-top:25px;
font-size:13px;
color:#bbb;
text-align:center;
line-height:1.6;
}

</style>
</head>

<body>

<div class="container">

<h1>💈STREET BARBER</h1>

<label>Nome</label>
<input type="text" id="nome">

<label>Serviço</label>
<select id="servico">
<option>Corte R$35</option>
<option>Corte + Sobrancelha R$40</option>
<option>Corte + Barba R$55</option>
<option>Barba R$30</option>
<option>Corte + Pigmentação R$50</option>
<option>Corte + Luzes R$75</option>
<option>Corte + Relaxamento R$65</option>
</select>

<label>Barbeiro</label>
<select id="barbeiro">
<option>Pastor</option>
</select>

<label>Data</label>
<input type="date" id="data">

<label>Horário</label>
<select id="hora"></select>

<button onclick="agendar()">Agendar Horário</button>
<button class="whatsapp" onclick="enviarWhats()">Enviar para WhatsApp</button>

<div class="agendamentos" id="lista"></div>

<div class="horarios">
<b>Horários de funcionamento:</b><br>
Terça a sexta: 9h às 19h<br>
Sábado: 9h às 16h
</div>

</div>

<script>

let numeroWhatsapp = "5519991365137";
let agendamentos = JSON.parse(localStorage.getItem("agenda")) || [];
let ultimoAgendamento = "";
mostrarAgendamentos();

document.getElementById("data").addEventListener("change", function(){

let dataSelecionada = new Date(this.value);
let diaSemana = dataSelecionada.getDay();
let horaSelect = document.getElementById("hora");

horaSelect.innerHTML = "";

if(diaSemana === 6){
    alert("Não atendemos aos domingos.");
    this.value = "";
    return;
}

if(diaSemana === 0){
    alert("Não atendemos às segundas.");
    this.value = "";
    return;
}

let horarios = [];

if(diaSemana >= 1 && diaSemana <= 4){
horarios = ["09:00","10:00","11:00","12:00","13:00","14:00","15:00","16:00","17:00","18:00","19:00"];
}

else if(diaSemana == 5){
horarios = ["09:00","10:00","11:00","12:00","13:00","14:00","15:00","16:00"];
}

horarios.forEach(h => {

let option = document.createElement("option");
option.value = h;
option.textContent = h;

horaSelect.appendChild(option);

});

});

function agendar(){

let nome = document.getElementById("nome").value;
let servico = document.getElementById("servico").value;
let barbeiro = document.getElementById("barbeiro").value;
let data = document.getElementById("data").value;
let hora = document.getElementById("hora").value;

if(nome == "" || data == ""){
alert("Preencha todos os campos");
return;
}

let horarioExiste = agendamentos.find(a => a.data == data && a.hora == hora && a.barbeiro == barbeiro);

if(horarioExiste){
alert("Esse horário já foi reservado!");
return;
}

let agendamento = { nome, servico, barbeiro, data, hora };

agendamentos.push(agendamento);

localStorage.setItem("agenda", JSON.stringify(agendamentos));

ultimoAgendamento = `
Cliente: ${nome}
Serviço: ${servico}
Barbeiro: ${barbeiro}
Data: ${data}
Horário: ${hora}
`;

limparCampos();
mostrarAgendamentos();

alert("Agendamento realizado!");

}

function mostrarAgendamentos(){

let lista = document.getElementById("lista");

lista.innerHTML = "";

agendamentos.forEach((a,i)=>{

let item = document.createElement("div");

item.className="item";

item.innerHTML=`
<b>${a.nome}</b><br>
Serviço: ${a.servico}<br>
Barbeiro: ${a.barbeiro}<br>
📅 ${a.data} às ${a.hora}
<br>
<button class="cancelar" onclick="remover(${i})">Cancelar</button>
`;

lista.appendChild(item);

});

}

function remover(i){

if(confirm("Cancelar agendamento?")){

agendamentos.splice(i,1);

localStorage.setItem("agenda", JSON.stringify(agendamentos));

mostrarAgendamentos();

}

}

function limparCampos(){

document.getElementById("nome").value="";
document.getElementById("data").value="";
document.getElementById("hora").innerHTML="";

}

function enviarWhats(){

if(ultimoAgendamento==""){
alert("Faça um agendamento primeiro");
return;
}

let url="https://wa.me/"+numeroWhatsapp+"?text="+encodeURIComponent(ultimoAgendamento);

window.open(url);

}

</script>

</body>
</html>
